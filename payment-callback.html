<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confirming your payment | Ruth Jackson</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#070e29">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
<style>
  .spin{width:54px;height:54px;border-radius:50%;border:4px solid rgba(255,255,255,.12);border-top-color:var(--azure);animation:sp 1s linear infinite;margin:0 auto 24px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card center" id="card">
    <div class="spin" id="spin"></div>
    <h2 id="cb-title">Confirming your payment…</h2>
    <p class="muted" id="cb-msg">Please wait while we verify your transaction with Pesapal. Don't close this page.</p>
    <div id="cb-actions" class="hero-actions" style="justify-content:center;margin-top:24px"></div>
  </div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/store.js"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const trackingId = params.get("OrderTrackingId") || params.get("orderTrackingId");
  let pending = {};
  try { pending = JSON.parse(localStorage.getItem("rj_pending_payment") || "{}"); } catch {}
  const orderTrackingId = trackingId || pending.orderTrackingId;

  function done(icon, title, msg, actions){
    $("spin").style.display = "none";
    $("cb-title").textContent = title;
    $("cb-title").insertAdjacentHTML("beforebegin", `<div style="font-size:3rem;margin-bottom:8px">${icon}</div>`);
    $("cb-msg").innerHTML = msg;
    $("cb-actions").innerHTML = actions || "";
  }

  if(!orderTrackingId){
    done("⚠️","No transaction found","We couldn't find a payment reference. If you were charged, please contact Ruth on <a href='https://wa.me/254714458530'>WhatsApp</a>.",
      `<a class="btn btn-gold" href="programs.html">Back to programs</a>`);
    return;
  }

  function enrollAndFinish(confirmation){
    const user = Store.currentUser();
    if(user && pending.programId){
      const r = Store.enroll(user.id, pending.programId);
      if(r && r.rec && confirmation){
        Store.addMessage(user.id, "ruth", `💳 Payment received (ref: ${confirmation}). Thank you! I'm preparing your access link now and will share it here shortly.`);
      }
    }
    localStorage.removeItem("rj_pending_payment");
    const prog = Store.programById(pending.programId);
    done("🎉","Payment successful!",
      `You're enrolled in <b>${prog ? prog.title : "your course"}</b>. Ruth will send your access link and instructions in your dashboard.`,
      `<a class="btn btn-gold" href="dashboard.html">Go to my dashboard</a>`);
    setTimeout(()=>{ if(Store.currentUser()) location.href="dashboard.html"; }, 3500);
  }

  async function check(){
    try{
      const r = await fetch("/api/pesapal/status.php?orderTrackingId="+encodeURIComponent(orderTrackingId));
      const d = await r.json();
      if(!r.ok) throw new Error(d.error || "Verification failed");
      const code = Number(d.status_code);
      const desc = (d.payment_status_description || "").toLowerCase();
      if(code === 1 || desc === "completed"){
        enrollAndFinish(d.confirmation_code || d.merchant_reference || "");
      } else if(code === 2 || desc === "failed"){
        done("❌","Payment not completed","Your payment didn't go through. No enrollment was created. You can try again.",
          `<a class="btn btn-gold" href="program.html?id=${pending.programId||''}">Try again</a> <a class="btn btn-ghost" href="https://wa.me/254714458530">WhatsApp Ruth</a>`);
      } else {
        // pending / invalid — let them re-check
        done("⏳","Payment pending","Pesapal hasn't confirmed this payment yet. If you've completed payment, give it a moment and check again.",
          `<button class="btn btn-gold" id="recheck">Check again</button> <a class="btn btn-ghost" href="dashboard.html">My dashboard</a>`);
        const rc = document.getElementById("recheck");
        rc && rc.addEventListener("click", ()=>{ rc.textContent="Checking…"; setTimeout(()=>location.reload(), 200); });
      }
    }catch(e){
      done("⚠️","Couldn't verify automatically",
        `We hit a snag verifying your payment: ${e.message}. If Pesapal charged you, contact Ruth on <a href='https://wa.me/254714458530'>WhatsApp</a> with your reference and she'll sort it immediately.`,
        `<a class="btn btn-gold" href="dashboard.html">My dashboard</a>`);
    }
  }
  check();
})();
</script>
</body>
</html>
