<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in, Ruth Jackson AI Coach</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#070e29">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <a class="brand" href="index.html" style="justify-content:center;margin-bottom:24px"><span class="logo">RJ</span><span>Ruth Jackson<small>AI Coach</small></span></a>

    <div id="notice"></div>

    <!-- LOGIN -->
    <form id="login-form">
      <h2 style="text-align:center;font-size:1.6rem">Welcome back</h2>
      <p class="muted center" style="margin-bottom:24px">Sign in to your dashboard</p>
      <div class="field"><label>Email</label><input type="email" id="li-email" required placeholder="you@email.com"></div>
      <div class="field"><label>Password</label><input type="password" id="li-pass" required placeholder="••••••••"></div>
      <button class="btn btn-gold btn-block" type="submit">Sign in</button>
      <p class="auth-switch">New here? <a href="#" id="to-signup">Create an account</a></p>
    </form>

    <!-- SIGNUP -->
    <form id="signup-form" class="hide">
      <h2 style="text-align:center;font-size:1.6rem">Create your account</h2>
      <p class="muted center" style="margin-bottom:24px">Start learning in minutes</p>
      <div class="field"><label>Full name</label><input type="text" id="su-name" required placeholder="Your name"></div>
      <div class="field"><label>Email</label><input type="email" id="su-email" required placeholder="you@email.com"></div>
      <div class="field"><label>Password</label><input type="password" id="su-pass" required placeholder="Choose a password" minlength="5"></div>
      <button class="btn btn-gold btn-block" type="submit">Create account</button>
      <p class="auth-switch">Already have an account? <a href="#" id="to-login">Sign in</a></p>
    </form>

  </div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/store.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const next = params.get("next");
  const notice = document.getElementById("notice");
  const show = (msg,type="err")=>{ notice.innerHTML = `<div class="notice ${type}">${msg}</div>`; };
  const loginF = document.getElementById("login-form");
  const signF = document.getElementById("signup-form");

  // already logged in?
  Store.ready().then(()=>{ const cu = Store.currentUser(); if(cu) redirect(cu); });

  document.getElementById("to-signup").onclick = e=>{e.preventDefault();loginF.classList.add("hide");signF.classList.remove("hide");notice.innerHTML="";};
  document.getElementById("to-login").onclick = e=>{e.preventDefault();signF.classList.add("hide");loginF.classList.remove("hide");notice.innerHTML="";};

  const $ = id => document.getElementById(id);
  loginF.onsubmit = async e=>{
    e.preventDefault();
    const email = $("li-email").value.trim();
    const password = $("li-pass").value;
    // Try admin first (server-verified). If not admin, log in as a customer.
    try{
      const ar = await fetch("/api/admin-login.php", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email, password})});
      if(ar.ok){ const d = await ar.json(); if(d.ok && d.token){ localStorage.setItem("rj_admin_session", d.token); location.href="admin.html"; return; } }
    }catch(err){}
    const r = await Store.login({email, password});
    if(!r.error){ redirect(r.user); return; }
    show(r.error);
  };
  signF.onsubmit = async e=>{
    e.preventDefault();
    const r = await Store.signup({name:$("su-name").value.trim(), email:$("su-email").value.trim(), password:$("su-pass").value});
    if(r.error) return show(r.error);
    redirect(r.user);
  };

  function redirect(user){
    if(next){ location.href = next; return; }
    location.href = user.role==="admin" ? "admin.html" : "dashboard.html";
  }
})();
</script>
</body>
</html>
