---
deployment:
  tasks:
    - export DEPLOYPATH=/home/irelandc/coachruthjackson.com
    - export SRC=$(/bin/mktemp -d)
    # Pull the latest code into a throwaway dir (independent of cPanel's repo
    # state) so a deploy always has a complete, correct tree.
    - /usr/bin/git clone --depth 1 --branch main https://github.com/princess-israel/ruth-jackson-coach.git "$SRC"
    # Abort if the clone is incomplete, so we never sync an empty tree.
    - /bin/test -f "$SRC/index.html"
    - /bin/mkdir -p "$DEPLOYPATH"
    # Copy into the live docroot. --inplace writes files directly (never a
    # temp+rename), so index.html is never momentarily missing, which is what
    # made LiteSpeed cache a 404 after each deploy. No --delete: keep
    # server-only runtime files (config.php, data/*.json) not in the repo.
    - /usr/bin/rsync -a --inplace --exclude='.git' --exclude='.cpanel.yml' "$SRC/" "$DEPLOYPATH/"
    # Force LiteSpeed to reload (clears the stale-file/404 cache).
    - /bin/echo "# litespeed reload $(date +%s)" >> "$DEPLOYPATH/.htaccess"
    - /usr/bin/touch "$DEPLOYPATH/.htaccess" "$DEPLOYPATH" "$DEPLOYPATH/index.html"
    - /bin/rm -rf "$SRC"
